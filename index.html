<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>范鑫澄成长积分 🌟</title>
<style>
  :root {
    --orange: #FF8C42;
    --yellow: #FFD166;
    --green: #06D6A0;
    --blue: #118AB2;
    --purple: #7B4FFF;
    --bg: #FFF9F0;
    --card: #FFFFFF;
    --text: #2D2D2D;
    --sub: #888;
    --red: #EF476F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  /* ---- Header ---- */
  .header { background: linear-gradient(135deg, #FF8C42, #FFD166); padding: 24px 16px 20px; text-align: center; position: relative; }
  .header .avatar-img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; box-shadow: 0 3px 12px rgba(0,0,0,.2); }
  .header .name { font-size: 20px; font-weight: 700; color: #fff; margin-top: 8px; text-shadow: 0 1px 4px rgba(0,0,0,.2); }
  .header .sub-title { font-size: 12px; color: rgba(255,255,255,.85); margin-top: 2px; }
  .header .lock-btn { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,.25); border: none; color: #fff; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px); }
  .header .lock-btn.locked { background: rgba(239,71,111,.5); }

  /* ---- Mode Banner ---- */
  .mode-banner { text-align: center; padding: 8px 16px; font-size: 12px; font-weight: 600; }
  .mode-banner.admin { background: var(--green); color: #fff; }
  .mode-banner.guest { background: #f0f0f0; color: var(--sub); }

  /* ---- Score Board ---- */
  .score-board { margin: 0 16px 16px; background: var(--card); border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,.1); padding: 20px 16px 16px; }
  .score-total { text-align: center; }
  .score-num { font-size: 64px; font-weight: 900; color: var(--orange); line-height: 1; }
  .score-label { font-size: 13px; color: var(--sub); margin-top: 4px; }
  .score-divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }
  .score-row { display: flex; justify-content: space-around; text-align: center; }
  .score-item .num { font-size: 22px; font-weight: 700; color: var(--blue); }
  .score-item .lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .score-item:nth-child(2) .num { color: var(--green); }
  .score-item:nth-child(3) .num { color: var(--purple); }

  /* ---- Date picker ---- */
  .date-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px; background: #fff; border-radius: 12px; margin: 0 16px 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .date-bar .date-lbl { font-size: 14px; font-weight: 600; color: var(--text); }
  .date-bar input[type=date] { border: none; outline: none; font-size: 14px; color: var(--blue); background: transparent; cursor: pointer; }
  .date-bar .today-btn { background: var(--orange); color: #fff; border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; }

  /* ---- Section ---- */
  .section { margin: 0 16px 16px; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .section-title .icon { font-size: 18px; }

  /* ---- Check Card ---- */
  .check-group { margin-bottom: 10px; }
  .check-group-name { font-size: 12px; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; padding-left: 4px; }
  .check-item { display: flex; align-items: center; background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.05); transition: all .2s; border: 2px solid transparent; }
  .check-item.clickable { cursor: pointer; }
  .check-item.done { border-color: var(--green); background: #f0fff8; }
  .check-item.core { border-left: 4px solid var(--orange); }
  .check-item .check-icon { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all .2s; }
  .check-item.done .check-icon { background: var(--green); border-color: var(--green); }
  .check-item .check-body { flex: 1; margin-left: 12px; }
  .check-item .check-name { font-size: 15px; font-weight: 600; }
  .check-item .check-desc { font-size: 12px; color: var(--sub); margin-top: 2px; line-height: 1.4; }
  .check-item .check-pts { font-size: 16px; font-weight: 700; color: var(--orange); flex-shrink: 0; }
  .check-item.done .check-pts { color: var(--green); }

  /* ---- Submit button ---- */
  .submit-wrap { text-align: center; margin: 16px 0 8px; }
  .submit-btn { background: linear-gradient(135deg, var(--orange), var(--yellow)); color: #fff; border: none; border-radius: 50px; padding: 14px 48px; font-size: 17px; font-weight: 700; box-shadow: 0 4px 16px rgba(255,140,66,.4); cursor: pointer; transition: transform .1s; }
  .submit-btn:active { transform: scale(.96); }
  .submit-btn:disabled { opacity: .4; cursor: not-allowed; background: #ccc; box-shadow: none; }

  /* ---- Today status ---- */
  .today-status { text-align: center; background: var(--card); border-radius: 14px; padding: 12px; margin: 8px 0; border: 2px solid var(--green); }
  .today-status .ts-score { font-size: 28px; font-weight: 800; color: var(--green); }
  .today-status .ts-label { font-size: 12px; color: var(--sub); }

  /* ---- Shop ---- */
  .shop-cat { font-size: 13px; color: var(--sub); font-weight: 700; margin: 14px 0 6px; padding-left: 2px; letter-spacing: .5px; }
  .shop-item { display: flex; align-items: center; background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.05); position: relative; }
  .shop-item .shop-emoji { font-size: 26px; flex-shrink: 0; }
  .shop-item .shop-body { flex: 1; margin-left: 12px; }
  .shop-item .shop-name { font-size: 14px; font-weight: 600; }
  .shop-item .shop-rule { font-size: 11px; color: var(--sub); margin-top: 3px; line-height: 1.4; }
  .shop-item .shop-pts { font-size: 18px; font-weight: 800; color: var(--purple); flex-shrink: 0; text-align: right; }
  .shop-item .shop-pts span { display: block; font-size: 10px; color: var(--sub); font-weight: 400; }
  .shop-item .redeem-btn { display: none; background: var(--orange); color: #fff; border: none; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: 8px; flex-shrink: 0; }
  .shop-item .redeem-btn:active { transform: scale(.95); }
  .shop-item .redeem-btn.show { display: inline-block; }
  .shop-item .redeem-btn.locked { background: #ccc; cursor: not-allowed; }

  /* ---- History toggle ---- */
  .history-btn { display: block; width: 100%; background: transparent; border: 2px solid var(--blue); color: var(--blue); border-radius: 50px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px; }
  .history-list { display: none; }
  .history-list.open { display: block; }
  .history-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .history-row .h-date { color: var(--sub); }
  .history-row .h-score { font-weight: 700; color: var(--orange); }
  .history-row .h-action { color: var(--red); font-size: 11px; font-weight: 600; }

  /* ---- Toast ---- */
  .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(.8); background: rgba(0,0,0,.8); color: #fff; border-radius: 16px; padding: 14px 24px; font-size: 16px; font-weight: 600; text-align: center; z-index: 999; opacity: 0; pointer-events: none; transition: all .3s; }
  .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  /* ---- Reset ---- */
  .reset-area { text-align: center; margin: 8px 0 24px; }
  .reset-area.hidden { display: none; }
  .reset-btn { background: transparent; border: 1px solid #ddd; color: #ccc; border-radius: 8px; padding: 6px 16px; font-size: 12px; cursor: pointer; }

  /* ---- Streak banner ---- */
  .streak-bar { display: flex; justify-content: center; gap: 8px; margin: 10px 0 0; flex-wrap: wrap; }
  .streak-day { width: 30px; height: 30px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .streak-day.pass { background: var(--green); }
  .streak-day.today-dot { background: var(--orange); }

  /* ---- Login Modal ---- */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal-overlay.hidden { display: none; }
  .modal-box { background: #fff; border-radius: 24px; padding: 32px 28px; text-align: center; width: 280px; box-shadow: 0 8px 40px rgba(0,0,0,.2); }
  .modal-box .modal-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 3px solid var(--orange); margin-bottom: 12px; }
  .modal-box .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal-box .modal-sub { font-size: 12px; color: var(--sub); margin-bottom: 18px; }
  .modal-box .pin-input { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .modal-box .pin-dot { width: 40px; height: 48px; border-radius: 10px; border: 2px solid #ddd; text-align: center; font-size: 22px; font-weight: 700; color: var(--text); -webkit-appearance: none; outline: none; caret-color: var(--orange); }
  .modal-box .pin-dot:focus { border-color: var(--orange); }
  .modal-box .modal-btn { background: linear-gradient(135deg, var(--orange), var(--yellow)); color: #fff; border: none; border-radius: 50px; padding: 12px 36px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
  .modal-box .modal-btn:active { transform: scale(.96); }
  .modal-box .modal-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 18px; }
  .modal-box .modal-logout { background: none; border: none; color: var(--sub); font-size: 12px; margin-top: 12px; cursor: pointer; text-decoration: underline; }

  /* ---- Redeem Confirm Modal ---- */
  .redeem-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .redeem-modal.hidden { display: none; }
  .redeem-box { background: #fff; border-radius: 24px; padding: 28px 24px; text-align: center; width: 290px; box-shadow: 0 8px 40px rgba(0,0,0,.2); }
  .redeem-box .rm-icon { font-size: 48px; margin-bottom: 10px; }
  .redeem-box .rm-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .redeem-box .rm-info { font-size: 13px; color: var(--sub); margin-bottom: 8px; }
  .redeem-box .rm-pts { font-size: 24px; font-weight: 800; color: var(--purple); margin-bottom: 16px; }
  .redeem-box .rm-row { display: flex; gap: 10px; }
  .redeem-box .rm-cancel { flex: 1; background: #f0f0f0; border: none; border-radius: 50px; padding: 12px; font-size: 14px; font-weight: 600; color: var(--sub); cursor: pointer; }
  .redeem-box .rm-confirm { flex: 1; background: var(--orange); border: none; border-radius: 50px; padding: 12px; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="lock-btn" id="lockBtn" onclick="toggleLock()">🔒 已上锁</button>
  <img class="avatar-img" src="avatar.png" alt="范鑫澄" onerror="this.style.display='none'">
  <div class="name">范鑫澄 成长积分</div>
  <div class="sub-title">幼小衔接冲刺版 · 每天努力 积分兑好东西</div>
</div>

<!-- Mode Banner -->
<div class="mode-banner guest" id="modeBanner">👀 访客模式 · 仅可查看，不能打卡或兑换</div>

<!-- Score Board -->
<div class="score-board">
  <div class="score-total">
    <div class="score-num" id="totalScore">0</div>
    <div class="score-label">累计总积分 ⭐</div>
  </div>
  <div class="streak-bar" id="streakBar"></div>
  <hr class="score-divider">
  <div class="score-row">
    <div class="score-item">
      <div class="num" id="weekScore">0</div>
      <div class="lbl">本周积分</div>
    </div>
    <div class="score-item">
      <div class="num" id="monthScore">0</div>
      <div class="lbl">本月积分</div>
    </div>
    <div class="score-item">
      <div class="num" id="checkDays">0</div>
      <div class="lbl">打卡天数</div>
    </div>
  </div>
</div>

<!-- Date Bar -->
<div class="date-bar">
  <span class="date-lbl">📅 打卡日期</span>
  <input type="date" id="datePicker">
  <button class="today-btn" onclick="goToday()">今天</button>
</div>

<!-- Check Section -->
<div class="section">
  <div class="section-title"><span class="icon">✅</span>今日打卡</div>
  <div id="checkList"></div>
  <div id="todaySubmitted" style="display:none">
    <div class="today-status">
      <div class="ts-score" id="submittedScore">0</div>
      <div class="ts-label">今日已提交 · 得分</div>
    </div>
  </div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" disabled onclick="submitToday()">🔒 请先解锁</button>
  </div>
</div>

<!-- History -->
<div class="section">
  <div class="section-title"><span class="icon">📊</span>历史记录</div>
  <button class="history-btn" onclick="toggleHistory()">查看历史记录 ▾</button>
  <div class="history-list" id="historyList"></div>
</div>

<!-- Shop Section -->
<div class="section">
  <div class="section-title"><span class="icon">🛒</span>积分超市</div>
  <div id="shopList"></div>
</div>

<!-- Reset (admin only) -->
<div class="reset-area hidden" id="resetArea">
  <button class="reset-btn" onclick="confirmReset()">清除全部数据</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <img class="modal-avatar" src="avatar.png" alt="范鑫澄" onerror="this.style.display='none'">
    <div class="modal-title">家长解锁</div>
    <div class="modal-sub">输入密码进入管理模式</div>
    <input type="password" id="pinInput" class="pin-dot" style="width:100%;text-align:center" maxlength="6" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="modal-btn" onclick="doLogin()">🔓 解锁</button>
    <div class="modal-err" id="loginErr"></div>
    <button class="modal-logout" id="logoutBtn" style="display:none" onclick="doLogout()">退出管理模式</button>
  </div>
</div>

<!-- Redeem Confirm Modal -->
<div class="redeem-modal hidden" id="redeemModal">
  <div class="redeem-box">
    <div class="rm-icon" id="rmIcon"></div>
    <div class="rm-title" id="rmTitle"></div>
    <div class="rm-info" id="rmInfo"></div>
    <div class="rm-pts" id="rmPts"></div>
    <div class="rm-row">
      <button class="rm-cancel" onclick="closeRedeem()">取消</button>
      <button class="rm-confirm" id="rmConfirm" onclick="confirmRedeem()">确认兑换</button>
    </div>
  </div>
</div>

<script>
// ========== 身份验证 ==========
const ADMIN_PIN = '202106';  // 默认密码：孩子生日年月，上线后可改
const KEY_AUTH = 'fxc_auth_v1';
const KEY_REDEEM = 'fxc_redeems_v1';

function isAdmin() { return sessionStorage.getItem(KEY_AUTH)==='admin'; }

function updateModeUI() {
  const admin = isAdmin();
  const lockBtn = document.getElementById('lockBtn');
  const modeBanner = document.getElementById('modeBanner');
  const submitBtn = document.getElementById('submitBtn');
  const resetArea = document.getElementById('resetArea');

  if(admin) {
    lockBtn.textContent = '🔓 已解锁';
    lockBtn.className = 'lock-btn';
    modeBanner.textContent = '🔓 管理模式 · 可以打卡与兑换积分';
    modeBanner.className = 'mode-banner admin';
    submitBtn.disabled = false;
    submitBtn.textContent = '💾 提交今日打卡';
    resetArea.classList.remove('hidden');
  } else {
    lockBtn.textContent = '🔒 已上锁';
    lockBtn.className = 'lock-btn locked';
    modeBanner.textContent = '👀 访客模式 · 仅可查看，不能打卡或兑换';
    modeBanner.className = 'mode-banner guest';
    submitBtn.disabled = true;
    submitBtn.textContent = '🔒 请先解锁';
    resetArea.classList.add('hidden');
  }
  renderCheckList();
  renderShop();
}

function toggleLock() {
  if(isAdmin()) {
    doLogout();
  } else {
    document.getElementById('loginModal').classList.remove('hidden');
    document.getElementById('pinInput').value = '';
    document.getElementById('loginErr').textContent = '';
    document.getElementById('logoutBtn').style.display = 'none';
    setTimeout(()=>document.getElementById('pinInput').focus(), 200);
  }
}

function doLogin() {
  const pin = document.getElementById('pinInput').value;
  if(pin === ADMIN_PIN) {
    sessionStorage.setItem(KEY_AUTH, 'admin');
    document.getElementById('loginModal').classList.add('hidden');
    updateModeUI();
    showToast('🔓 管理模式已开启');
  } else {
    document.getElementById('loginErr').textContent = '密码错误，请重试';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function doLogout() {
  sessionStorage.removeItem(KEY_AUTH);
  document.getElementById('loginModal').classList.add('hidden');
  updateModeUI();
  showToast('🔒 已退出管理模式');
}

// ========== 打卡项目数据 ==========
const TASKS = [
  { id:'no_hair', group:'⭐ 核心习惯（各4分，必打）', name:'不摸头发', desc:'全天未摸/卷头发，自觉提醒自己', pts:4, core:true },
  { id:'eat_well', group:'⭐ 核心习惯（各4分，必打）', name:'好好吃饭', desc:'不挑食不剩饭，20分钟内专心吃完', pts:4, core:true },
  { id:'focus', group:'⭐ 核心习惯（各4分，必打）', name:'专注练习', desc:'做作业/学习时不分心，保持19分钟以上', pts:4, core:true },
  { id:'pinyin', group:'⭐ 核心习惯（各4分，必打）', name:'拼音启蒙', desc:'每日跟读拼音，认读当日字母/音节，不应付', pts:4, core:true },
  { id:'self_care', group:'⭐ 核心习惯（各4分，必打）', name:'基本自理', desc:'自己穿脱衣裤、整理书包、收纳玩具，不依赖大人', pts:4, core:true },
  { id:'outdoor', group:'🏃 健康体魄（各2分）', name:'户外运动', desc:'每日户外活动≥30分钟（吊杆/跳绳/跑步/骑车等）', pts:2, core:false },
  { id:'sleep', group:'🏃 健康体魄（各2分）', name:'作息守时', desc:'晚9点30分前上床，不拖延', pts:2, core:false },
  { id:'shower', group:'🏃 健康体魄（各2分）', name:'洗澡洗漱', desc:'独立洗澡+刷牙洗脸，按时完成，无需催', pts:2, core:false },
  { id:'toilet', group:'🏃 健康体魄（各2分）', name:'独立如厕', desc:'自主如厕，自己擦干净、整理衣裤', pts:2, core:false },
  { id:'screen', group:'🏃 健康体魄（各2分）', name:'屏幕自律', desc:'晚8点30分后不看任何电子产品', pts:2, core:false },
  { id:'emotion', group:'💛 品格社交（各1分）', name:'情绪管理', desc:'生气时不打人不大喊，用语言表达', pts:1, core:false },
  { id:'polite', group:'💛 品格社交（各1分）', name:'礼貌礼仪', desc:'主动问好，常说谢谢/对不起', pts:1, core:false },
  { id:'math', group:'📚 学习启蒙（各2分）', name:'数学练习', desc:'完成当日数学练习，认真细心', pts:2, core:false },
  { id:'reading', group:'📚 学习启蒙（各2分）', name:'绘本阅读', desc:'语文或英语精读绘本≥1本或阅读打卡', pts:2, core:false },
  { id:'safety', group:'🛡️ 安全意识（1分）', name:'安全意识', desc:'出行佩戴头盔及电话手表，不跟陌生人走', pts:1, core:false },
];
const MAX_SCORE = TASKS.reduce((s,t)=>s+t.pts, 0);

// ========== 积分超市数据 ==========
const SHOP = [
  { cat:'📱 屏幕时间', emoji:'📱', name:'手机/平板 10分钟', rule:'仅周五晚—周日可用，到点即停', pts:10 },
  { cat:'📱 屏幕时间', emoji:'📱', name:'手机/平板 延长至15分钟', rule:'已用10分钟后申请，需家长确认', pts:15 },
  { cat:'📱 屏幕时间', emoji:'📺', name:'电视 15分钟', rule:'仅周五晚—周日可用，到点即停', pts:10 },
  { cat:'📱 屏幕时间', emoji:'📺', name:'电视 延长至20分钟', rule:'已看15分钟后申请，需家长确认', pts:20 },

// ========== 工具函数 ==========
const KEY_RECORDS = 'fxc_records_v2';
function loadRecords() { try { return JSON.parse(localStorage.getItem(KEY_RECORDS)||'{}'); } catch(e){ return {}; } }
function saveRecords(r) { localStorage.setItem(KEY_RECORDS, JSON.stringify(r)); }
function loadRedeems() { try { return JSON.parse(localStorage.getItem(KEY_REDEEM)||'[]'); } catch(e){ return []; } }
function saveRedeems(r) { localStorage.setItem(KEY_REDEEM, JSON.stringify(r)); }

function dateStr(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function todayStr() { return dateStr(new Date()); }
function weekStart(d) {
  const dt = new Date(d);
  const day = dt.getDay() || 7;
  dt.setDate(dt.getDate() - day + 1);
  return dateStr(dt);
}
function monthStr(d) { return d.slice(0,7); }

// ========== 状态 ==========
let currentDate = todayStr();
let checked = {};
let pendingRedeemIdx = -1;

// ========== 渲染 ==========
function renderAll() {
  renderScoreBoard();
  renderCheckList();
  renderShop();
  renderHistory();
}

function renderScoreBoard() {
  const records = loadRecords();
  const redeems = loadRedeems();
  const all = Object.values(records);
  const earned = all.reduce((s,r)=>s+r.score,0);
  const spent = redeems.reduce((s,r)=>s+r.pts,0);
  const total = earned - spent;
  document.getElementById('totalScore').textContent = Math.max(0, total);

  const today = new Date();
  const ws = weekStart(dateStr(today));
  const ms = monthStr(dateStr(today));
  let week=0, month=0, days=0;
  for(const [k,v] of Object.entries(records)) {
    if(v.score>0) days++;
    if(k>=ws) week+=v.score;
    if(k.startsWith(ms)) month+=v.score;
  }
  document.getElementById('weekScore').textContent = week;
  document.getElementById('monthScore').textContent = month;
  document.getElementById('checkDays').textContent = days;

  const bar = document.getElementById('streakBar');
  bar.innerHTML = '';
  for(let i=6;i>=0;i--) {
    const d2 = new Date(today);
    d2.setDate(today.getDate()-i);
    const ds = dateStr(d2);
    const div = document.createElement('div');
    div.className = 'streak-day';
    const rec = records[ds];
    if(ds===dateStr(today)) {
      div.className += ' today-dot';
      div.textContent = '今';
    } else if(rec && rec.score>0) {
      div.className += ' pass';
      div.textContent = '✓';
    } else {
      div.textContent = d2.getDate();
      div.style.fontSize='11px';
    }
    bar.appendChild(div);
  }
}

function renderCheckList() {
  const records = loadRecords();
  const rec = records[currentDate];
  const submitted = !!rec;

  const dp = document.getElementById('datePicker');
  dp.value = currentDate;

  const groups = {};
  for(const t of TASKS) {
    if(!groups[t.group]) groups[t.group]=[];
    groups[t.group].push(t);
  }

  const container = document.getElementById('checkList');
  container.innerHTML = '';

  const admin = isAdmin();

  for(const [gname, items] of Object.entries(groups)) {
    const gDiv = document.createElement('div');
    gDiv.className = 'check-group';
    const gnDiv = document.createElement('div');
    gnDiv.className = 'check-group-name';
    gnDiv.textContent = gname;
    gDiv.appendChild(gnDiv);

    for(const task of items) {
      const div = document.createElement('div');
      const isDone = submitted ? !!(rec.done||{})[task.id] : !!(checked[task.id]);
      div.className = 'check-item' + (task.core?' core':'') + (isDone?' done':'') + ((admin && !submitted)?' clickable':'');
      div.innerHTML = `
        <div class="check-icon">${isDone?'✓':''}</div>
        <div class="check-body">
          <div class="check-name">${task.name}</div>
          <div class="check-desc">${task.desc}</div>
        </div>
        <div class="check-pts">${task.pts}分</div>
      `;
      if(admin && !submitted) {
        div.onclick = () => { checked[task.id]=!checked[task.id]; renderCheckList(); };
      }
      gDiv.appendChild(div);
    }
    container.appendChild(gDiv);
  }

  const submitDiv = document.getElementById('todaySubmitted');
  const submitBtn = document.getElementById('submitBtn');
  if(submitted) {
    submitDiv.style.display = 'block';
    document.getElementById('submittedScore').textContent = rec.score + '/' + MAX_SCORE + ' 分';
    if(admin) {
      submitBtn.textContent = '✏️ 修改今日打卡';
      submitBtn.disabled = false;
      submitBtn.onclick = editToday;
    } else {
      submitBtn.textContent = '🔒 请先解锁';
      submitBtn.disabled = true;
    }
  } else {
    submitDiv.style.display = 'none';
    if(admin) {
      submitBtn.textContent = '💾 提交今日打卡';
      submitBtn.disabled = false;
      submitBtn.onclick = submitToday;
    } else {
      submitBtn.textContent = '🔒 请先解锁';
      submitBtn.disabled = true;
    }
  }
}

function renderShop() {
  const records = loadRecords();
  const redeems = loadRedeems();
  const earned = Object.values(records).reduce((s,r)=>s+r.score,0);
  const spent = redeems.reduce((s,r)=>s+r.pts,0);
  const total = Math.max(0, earned - spent);

  const container = document.getElementById('shopList');
  const admin = isAdmin();
  container.innerHTML = `<div style="text-align:center;font-size:13px;color:var(--sub);margin-bottom:12px">当前余额 <b style="color:var(--purple);font-size:18px">${total}</b> 积分` +
    (spent>0 ? `<span style="font-size:11px;color:var(--sub);margin-left:4px">(累计获得${earned}，已兑换${spent})</span>` : ``) +
    `</div>`;

  let lastCat = '';
  SHOP.forEach((item, idx) => {
    if(item.cat!==lastCat) {
      const cat = document.createElement('div');
      cat.className = 'shop-cat';
      cat.textContent = item.cat;
      container.appendChild(cat);
      lastCat = item.cat;
    }
    const div = document.createElement('div');
    const canBuy = total >= item.pts;
    div.className = 'shop-item';
    div.style.opacity = canBuy ? '1' : '0.5';
    div.innerHTML = `
      <div class="shop-emoji">${item.emoji}</div>
      <div class="shop-body">
        <div class="shop-name">${item.name}</div>
        <div class="shop-rule">${item.rule}</div>
      </div>
      <div class="shop-pts">${item.pts}<span>积分</span></div>
      <button class="redeem-btn ${admin?'show':''} ${canBuy?'':'locked'}" 
        ${(admin && canBuy) ? '' : 'disabled'}
        onclick="event.stopPropagation(); openRedeem(${idx})">兑换</button>
    `;
    container.appendChild(div);
  });
}

function renderHistory() {
  const records = loadRecords();
  const redeems = loadRedeems();
  const sorted = Object.entries(records).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
  const container = document.getElementById('historyList');
  if(sorted.length===0) { container.innerHTML='<div style="text-align:center;color:#ccc;font-size:13px;padding:16px">暂无记录</div>'; return; }
  container.innerHTML = sorted.map(([k,v])=>{
    const pct = Math.round(v.score/MAX_SCORE*100);
    const stars = '🌟'.repeat(Math.floor(pct/25));
    // Check if any redeems on this date
    const dayRedeems = redeems.filter(r=>r.date===k);
    const rStr = dayRedeems.length>0 ? ` <span class="h-action">-${dayRedeems.reduce((s,r)=>s+r.pts,0)}</span>` : '';
    return `<div class="history-row"><span class="h-date">${k}</span><span>${stars}</span><span class="h-score">${v.score}/${MAX_SCORE}${rStr}</span></div>`;
  }).join('');
}

// ========== 兑换交互 ==========
function openRedeem(idx) {
  if(!isAdmin()) { showToast('🔒 请先解锁再兑换'); return; }
  if(pendingRedeemIdx === idx && !document.getElementById('redeemModal').classList.contains('hidden')) return;
  pendingRedeemIdx = idx;
  const item = SHOP[idx];
  document.getElementById('rmIcon').textContent = item.emoji;
  document.getElementById('rmTitle').textContent = item.name;
  document.getElementById('rmInfo').textContent = item.rule;
  document.getElementById('rmPts').textContent = item.pts + ' 积分';
  document.getElementById('redeemModal').classList.remove('hidden');
}

function closeRedeem() {
  document.getElementById('redeemModal').classList.add('hidden');
  pendingRedeemIdx = -1;
}

function confirmRedeem() {
  if(pendingRedeemIdx<0) return;
  const records = loadRecords();
  const redeems = loadRedeems();
  const earned = Object.values(records).reduce((s,r)=>s+r.score,0);
  const spent = redeems.reduce((s,r)=>s+r.pts,0);
  const total = Math.max(0, earned - spent);
  const item = SHOP[pendingRedeemIdx];

  if(total < item.pts) {
    showToast('积分不足，无法兑换');
    closeRedeem();
    return;
  }

  redeems.push({ date: todayStr(), name: item.name, pts: item.pts, idx: pendingRedeemIdx });
  saveRedeems(redeems);
  closeRedeem();
  showToast(`✅ 已兑换「${item.name}」`);
  renderAll();
}

// ========== 打卡交互 ==========
function goToday() {
  currentDate = todayStr();
  checked = {};
  renderCheckList();
}

document.getElementById('datePicker').addEventListener('change', function() {
  currentDate = this.value;
  checked = {};
  const records = loadRecords();
  const rec = records[currentDate];
  if(rec) { checked = {...(rec.done||{})}; }
  renderCheckList();
});

function submitToday() {
  if(!isAdmin()) { showToast('🔒 请先解锁再提交'); return; }
  const score = TASKS.reduce((s,t)=>s+(checked[t.id]?t.pts:0), 0);
  const records = loadRecords();
  records[currentDate] = { score, done: {...checked} };
  saveRecords(records);
  showToast(score>=MAX_SCORE ? '🎉 满分！超棒！' : `提交成功！今天得 ${score} 分`);
  renderAll();
}

function editToday() {
  if(!isAdmin()) return;
  const records = loadRecords();
  const rec = records[currentDate];
  if(rec) checked = {...(rec.done||{})};
  delete records[currentDate];
  saveRecords(records);
  renderCheckList();
}

function toggleHistory() {
  const list = document.getElementById('historyList');
  list.classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function confirmReset() {
  if(!isAdmin()) return;
  if(confirm('确定要清除全部打卡数据和兑换记录吗？此操作不可恢复。')) {
    localStorage.removeItem(KEY_RECORDS);
    localStorage.removeItem(KEY_REDEEM);
    checked = {};
    renderAll();
    showToast('已清除全部数据');
  }
}

// ========== 初始化 ==========
document.getElementById('datePicker').value = currentDate;
updateModeUI();
renderAll();
</script>
